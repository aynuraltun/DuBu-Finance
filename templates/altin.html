<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altın Fiyatları - Dubu Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;800&family=Open Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .gold-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .gold-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .gold-chart { background: var(--color-surface); height: 600px; border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow-md); border-top: 4px solid var(--color-accent);}
        .gold-rates { background: var(--color-surface); border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow-md); }
        .gold-header { color: var(--color-accent); font-family: var(--font-display); margin-bottom: 1.5rem; font-size: 1.5rem; }
    </style>
</head>
<body>
    <header class="top-nav">
        <a href="/" class="logo"><span class="icon">⬢</span><span>Dubu<span class="light">Finans</span></span></a>
        <nav class="main-menu" id="dynamic-nav"></nav>
    </header>

    <main class="gold-container">
        <div class="gold-grid">
            <div class="gold-chart">
                <h2 class="gold-header">Altın (ONS) 1 Yıllık Performans</h2>
                <div id="gold-chart-div" style="width:100%; height:calc(100% - 50px);"></div>
            </div>

            <div class="gold-rates">
                <h2 class="gold-header">Canlı Piyasa Verileri</h2>
                <!-- BIST30'dan örnek canlı veri çekip gösterelim (Altın için de çalışır) -->
                <div class="table-container fade-bottom" style="flex:1; overflow-y:auto;">
                    <table class="market-table" id="market-table-gold">
                        <thead><tr><th>Emtia / Döviz</th><th>Fiyat</th><th>% Değişim</th></tr></thead>
                        <tbody>
                            <tr>
                                <td class="sym-name" style="color:var(--color-accent)">XAU/USD (ONS)</td>
                                <td>2.350,40 $</td>
                                <td class="val-up">+0.42%</td>
                            </tr>
                            <tr>
                                <td class="sym-name">USD/TRY</td>
                                <td>33,50 ₺</td>
                                <td class="val-up">+0.15%</td>
                            </tr>
                            <tr>
                                <td class="sym-name" style="color:var(--color-accent)">Gram Altın</td>
                                <td>2.530,00 ₺</td>
                                <td class="val-up">+0.57%</td>
                            </tr>
                            <tr>
                                <td class="sym-name">EUR/TRY</td>
                                <td>36,20 ₺</td>
                                <td class="val-down">-0.10%</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chartDiv = document.getElementById('gold-chart-div');
            const chart = LightweightCharts.createChart(chartDiv, {
                layout: { textColor: '#1a1a1a', background: { type: 'solid', color: 'transparent' } },
                grid: { vertLines: { color: 'rgba(1, 59, 44, 0.05)' }, horzLines: { color: 'rgba(1, 59, 44, 0.05)' } },
                rightPriceScale: { borderVisible: false },
                timeScale: { borderVisible: false }
            });
            const areaSeries = chart.addAreaSeries({ 
                lineColor: '#013b2c', topColor: 'rgba(1, 59, 44, 0.3)', bottomColor: 'rgba(1, 59, 44, 0)', lineWidth: 2 
            });

            // Altın verisini API'den çek (server tarafında GC=F parametresi olarak işleniyor)
            fetch('/api/history/ALTIN')
                .then(r => r.json())
                .then(data => {
                    if (data && !data.error) {
                        areaSeries.setData(data);
                        chart.timeScale().fitContent();
                    } else {
                        chartDiv.innerHTML = '<p>Veri çekilemedi.</p>';
                    }
                });

            new ResizeObserver(() => { chart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight }); }).observe(chartDiv);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takip Listem - Dubu Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .page-wrap { max-width: 1000px; margin: 3rem auto; padding: 0 2rem; }
        .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .fav-card {
            background: #fff; padding: 1.5rem; border-radius: 12px;
            box-shadow: var(--shadow-sm); border: 1px solid #eee;
            transition: 0.2s; cursor: pointer; position: relative;
        }
        .fav-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); border-color: #f59e0b; }
        .fav-symbol { font-family: var(--font-display); font-weight: 800; font-size: 1.4rem; color: var(--color-primary); }
        .fav-price { font-family: var(--font-data); font-size: 1.2rem; font-weight: 700; color: var(--color-text); margin-top: 0.5rem; }
        .empty-state { text-align: center; padding: 4rem 1rem; background: #fff; border-radius: 16px; border: 2px dashed #e2e8f0; }
        .remove-btn { position: absolute; top: 1rem; right: 1rem; color: #dc2626; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <header class="top-nav">
        <a href="/" class="logo">
            <span class="logo-main">Dubu</span>
            <span class="logo-sub">Finance</span>
        </a>
        <div class="burger-area">
            <button class="burger-btn" id="burger-btn" aria-label="Menü">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div id="user-badge" class="user-badge"></div>
        <nav class="burger-menu" id="burger-menu">
            <ul>
                <li class="span-2"><a href="/">Ana Sayfa</a></li>
                <li><a href="/bist100.html">BİST 100</a></li>
                <li><a href="/madenler.html">Kıymetli Madenler</a></li>
                <li><a href="/takip">Takip Listem</a></li>
                <li><a href="/halkaarz.html" style="border-color:#f59e0b; color:#d97706;">Halka Arzlar</a></li>
                <li class="burger-divider" style="grid-column: span 2; border-top: 1px solid #eee; margin:1rem 0;"></li>
               <li id="burger-auth" style="grid-column: span 2;"></li>
            </ul>
        </nav>
    </header>

    <div class="page-wrap">
        <div class="section-header">
            <h1 style="color:var(--color-primary); font-family:var(--font-display); font-weight:900;">⭐ Favoriler</h1>
        </div>
        
        <div id="fav-container" class="fav-grid">
            <div style="grid-column: 1/-1; text-align:center; padding: 3rem;">Yükleniyor...</div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initUI();
            fetch('/api/favorites_data')
                .then(r => r.json())
                .then(data => {
                    const cont = document.getElementById('fav-container');
                    if (data.error || data.length === 0) {
                        cont.innerHTML = `
                            <div class="empty-state">
                                <h3 style="color:#64748b; margin-bottom:1rem;">Henüz hiçbir şeyi favorilemediniz.</h3>
                                <p style="color:#94a3b8;">BİST 100, madenler veya halka arzlar sayfasından yıldız ikonuna tıklayarak ilk favorinizi ekleyin.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    cont.innerHTML = '';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'fav-card';
                        div.onclick = (e) => { 
                            if(e.target.className !== 'remove-btn') window.location.href = `/hisse/${item.symbol}`;
                        };
                        div.innerHTML = `
                            <button class="remove-btn" title="Favorilerden Çıkar" onclick="removeFav('${item.symbol}', event)">✖</button>
                            <div class="fav-symbol">${item.symbol}</div>
                            <div class="fav-price">${item.price} <span style="color:var(--color-up); font-size:0.9rem;">${item.change}</span></div>
                        `;
                        cont.appendChild(div);
                    });
                })
                .catch(() => {
                    document.getElementById('fav-container').innerHTML = '<div style="text-align:center">Önce giriş yapmalısınız.</div>';
                });
        });
        
        async function removeFav(sym, e) {
            e.stopPropagation();
            await fetch(`/api/favorites/${sym}`, { method: 'DELETE' });
            window.location.reload();
        }
    </script>
</body>
</html>

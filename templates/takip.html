<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takip Ettiklerim | Dubu Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .watchlist-wrap { max-width: 900px; margin: 2.5rem auto; padding: 0 2rem; }
        .watchlist-card { background: var(--color-surface); border-radius: 12px; padding: 2rem; box-shadow: var(--shadow-md); }
        .watchlist-title { font-family: var(--font-display); font-size: 1.75rem; font-weight: 900; color: var(--color-primary); margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid rgba(1,59,44,0.1); }
        .watchlist-empty { text-align: center; padding: 3rem 1rem; color: var(--color-muted); }
        .watchlist-empty h2 { font-family: var(--font-display); color: var(--color-text); margin-bottom: 0.75rem; }
        .detail-btn { background: var(--color-primary); color: #fff; border: none; padding: 0.35rem 0.85rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; font-family: var(--font-display); }
        .detail-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <header class="top-nav">
        <a href="/" class="logo">
            <span class="logo-gem">◆</span>
            <span class="logo-text">Dubu <span class="logo-light">Finance</span></span>
        </a>
        <nav class="main-menu" id="dynamic-nav"></nav>
        <div class="live-status"><span class="pulse"></span> Piyasa Açık</div>
    </header>

    <main class="watchlist-wrap">
        <div class="watchlist-card">
            <div class="watchlist-title">⭐ Takip Ettiklerim</div>
            <div id="watchlist-container">
                <p style="color:#999; text-align:center; padding:2rem">Yükleniyor...</p>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BİST 100 Hisseleri - Dubu Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .bist-page { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .bist-card { background: var(--color-surface); border-radius: 12px; padding: 2rem; box-shadow: var(--shadow-md); }
        .bist-header { margin-bottom: 1.5rem; }
        .bist-title { font-family: var(--font-display); font-size: 1.75rem; font-weight: 900; color: var(--color-primary); }
        .bist-sub   { font-size: 0.9rem; color: var(--color-muted); margin-top: 0.25rem; }
        .market-table th { font-size: 0.8rem; }
        .market-table td { font-size: 0.88rem; }
        /* Hisse kodu sütunu sola yaslı */
        .market-table th:nth-child(2),
        .market-table td:nth-child(2) { text-align: left; }
        /* Fiyat ve diğerleri sağa */
        .market-table th:nth-child(3),
        .market-table td:nth-child(3),
        .market-table th:nth-child(4),
        .market-table td:nth-child(4),
        .market-table th:nth-child(5),
        .market-table td:nth-child(5) { text-align: right; }
        /* Favori sütunu dar */
        .market-table th:nth-child(1),
        .market-table td:nth-child(1) { width: 36px; text-align: center; }
    </style>
</head>
<body>
    <header class="top-nav">
        <a href="/" class="logo">
            <span class="logo-gem">◆</span>
            <span class="logo-text">Dubu <span class="logo-light">Finance</span></span>
        </a>
        <div class="burger-area">
            <button class="burger-btn" id="burger-btn" aria-label="Menü">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="user-badge" id="user-badge"></div>
        <nav class="burger-menu" id="burger-menu">
            <ul>
                <li><a href="/">Ana Sayfa</a></li>
                <li><a href="/bist100.html">BİST 100</a></li>
                <li><a href="/bist30.html">BİST 30</a></li>
                <li><a href="/halkaarz.html">Halka Arz</a></li>
                <li><a href="/altin.html">Altın</a></li>
                <li><a href="/takip">⭐ Takip Ettiklerim</a></li>
                <li class="burger-divider"></li>
                <li id="burger-auth"></li>
            </ul>
        </nav>
    </header>

    <main class="bist-page">
        <div class="bist-card">
            <div class="bist-header">
                <div class="bist-title">BİST 100 Hisseleri</div>
                <div class="bist-sub">Güncel veriler TradingView üzerinden çekilmektedir. Hisse üzerine tıklayarak detay sayfasına gidin.</div>
            </div>
            <div style="overflow-x:auto;">
                <table class="market-table" id="market-table-bist100">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Hisse Kodu</th>
                            <th>Fiyat (₺)</th>
                            <th>Değişim (%)</th>
                            <th>Hacim</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;padding:2.5rem;color:#999">Veriler yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadFullTable('market-table-bist100', 100);
        });
    </script>
</body>
</html>
